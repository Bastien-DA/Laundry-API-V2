name: Generate SDKs (Flutter & TS)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-sdk:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app?schema=public
      JWT_SECRET: "change_me_change_me_change_me_123456"
      JWT_EXPIRES_IN: "30d"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Environments (Node, Java, Flutter)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Project Dependencies & Build API
        run: |
          npm ci --include=dev
          npx prisma generate
          npm run build

      - name: Run API & Export Swagger
        env:
          NODE_ENV: production
        run: |
          # Lancement en arrière-plan
          MAIN_JS="$(find dist -type f -name 'main.js' | head -n 1)"
          node "$MAIN_JS" &
          echo $! > api.pid

          # Attente du Swagger
          for i in {1..60}; do
            if curl -sSf http://localhost:3000/docs-json -o swagger.json; then
              echo "Swagger downloaded"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install OpenAPI Generator
        run: wget -q https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.17.0/openapi-generator-cli-7.17.0.jar -O openapi-generator-cli.jar

      # --- GENERATION FLUTTER ---
      - name: Generate & Build Flutter SDK
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i swagger.json -g dart-dio -o sdk-flutter \
            --additional-properties=pubName=laundry_api_sdk,serializationLibrary=json_serializable
          
          cd sdk-flutter
          # Ton patch de version
          sed -i 's/^  sdk: .*/  sdk: ">=3.8.0 <4.0.0"/' pubspec.yaml || true
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          
          mkdir -p /tmp/final-sdk-flutter
          cp -r . /tmp/final-sdk-flutter

      # --- GENERATION TYPESCRIPT ---
      - name: Generate & Build TS SDK
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i swagger.json -g typescript-axios -o sdk-ts \
            --additional-properties=npmName=@laundry/api-sdk,supportsES6=true,withInterfaces=true
          
          cd sdk-ts
          npm install
          npm run build
          
          mkdir -p /tmp/final-sdk-ts
          cp -r . /tmp/final-sdk-ts

      - name: Stop API
        if: always()
        run: "[ -f api.pid ] && kill $(cat api.pid) || true"

      # --- DEPLOY FLUTTER BRANCH ---
      - name: Push Flutter SDK
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git fetch origin sdk || true
          git checkout -B sdk
          rm -rf ./*
          cp -r /tmp/final-sdk-flutter/* .
          git add .
          git commit -m "Update Flutter SDK" && git push origin sdk --force || echo "No changes"

      # --- DEPLOY TS BRANCH ---
      - name: Push TS SDK
        run: |
          # On repart du main pour être sûr d'avoir une base propre pour l'orphan
          git checkout main
          git checkout --orphan sdk-ts
          rm -rf ./*
          cp -r /tmp/final-sdk-ts/* .
          git add -f build || git add -f dist || echo "No build/dist folder found"
          git add .
          git commit -m "Update TS SDK" && git push origin sdk-ts --force || echo "No changes"