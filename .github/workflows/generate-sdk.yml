name: Generate SDKs (Flutter & TS)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-sdk:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app?schema=public
      JWT_SECRET: "change_me_change_me_change_me_123456"
      JWT_EXPIRES_IN: "30d"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Environments (Node, Java, Flutter)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Project Dependencies & Build API
        run: |
          npm ci --include=dev
          npx prisma generate
          npm run build

      - name: Run API & Export Swagger
        env:
          NODE_ENV: production
        run: |
          MAIN_JS="$(find dist -type f -name 'main.js' | head -n 1)"
          node "$MAIN_JS" &
          echo $! > api.pid

          for i in {1..60}; do
            if curl -sSf http://localhost:3000/docs-json -o swagger.json; then
              echo "Swagger downloaded"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Install OpenAPI Generator
        run: wget -q https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.17.0/openapi-generator-cli-7.17.0.jar -O openapi-generator-cli.jar

      # --- GENERATION FLUTTER ---
      - name: Generate & Build Flutter SDK
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i swagger.json -g dart-dio -o /tmp/final-sdk-flutter \
            --additional-properties=pubName=laundry_api_sdk,serializationLibrary=json_serializable
          
          cd /tmp/final-sdk-flutter
          sed -i 's/^  sdk: .*/  sdk: ">=3.8.0 <4.0.0"/' pubspec.yaml || true
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      # --- GENERATION TYPESCRIPT ---
      - name: Generate & Build TS SDK
        run: |
          java -jar openapi-generator-cli.jar generate \
            -i swagger.json -g typescript-axios -o /tmp/final-sdk-ts \
            --additional-properties=npmName=@laundry/api-sdk,supportsES6=true,withInterfaces=true
          
          cd /tmp/final-sdk-ts
          
          # MODIFICATION ICI : On ajuste le package.json ET on supprime le script prepare
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.main = './dist/index.js';
            pkg.typings = './dist/index.d.ts';
            pkg.module = './dist/esm/index.js';
            pkg.files = ['dist', 'package.json', 'README.md'];
          
            // ON SUPPRIME LE SCRIPT PREPARE POUR ÉVITER LE BUILD LOCAL
            delete pkg.scripts.prepare;
          
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          
          npm install
          npm run build
          rm -f .gitignore .npmignore

      - name: Stop API
        if: always()
        run: "[ -f api.pid ] && kill $(cat api.pid) || true"

      # --- DEPLOY FLUTTER BRANCH ---
      - name: Push Flutter SDK
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout -B sdk
          git rm -rf .
          cp -r /tmp/final-sdk-flutter/* .
          git add .
          git commit -m "Update Flutter SDK [skip ci]" && git push origin sdk --force || echo "No changes"

      # --- DEPLOY TS BRANCH ---
      - name: Push TS SDK
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout --orphan sdk-ts-temp
          git rm -rf .
          
          # On ne copie que ce qui est vital pour le SDK propre
          cp -r /tmp/final-sdk-ts/dist .
          cp /tmp/final-sdk-ts/package.json .
          cp /tmp/final-sdk-ts/README.md . 2>/dev/null || true
          
          # On force l'ajout du dossier dist pour éviter tout oubli
          git add -f dist/
          git add .
          git commit -m "Update TS SDK with dist folder [skip ci]"
          git push origin sdk-ts-temp:sdk-ts --force